<div class="button-corral" style="display: grid; grid-template-columns: 1fr 1fr;">
  <a href="{{ value.url.get_url }}"
    {% if value.url.new_window %}target="_blank"{% endif %}
    style="grid-column: span 2; {% if value.width == 'half' %}width: 50%; {% if value.alignment == 'center' %}margin-inline: auto;{% endif %}{% endif %}"
    class="submit-button"
  >{{ value.text }}{% if value.icon %} <i class="{{ value.icon }}"></i>{% endif %}</a>
</div>
